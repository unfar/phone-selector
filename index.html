<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>📱 智能手机选购助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#2563eb;--primary-light:#eff6ff;--primary-dark:#1d4ed8;--bg:#f8fafc;--card-bg:#fff;--text:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 10px 25px -5px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.04);--radius:16px;--radius-sm:10px;--radius-full:999px}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
        .container{max-width:1440px;margin:0 auto;padding:24px 20px 80px}
        .header{text-align:center;padding:40px 0 32px}
        .header h1{font-size:2.2rem;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#1e40af,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header p{color:var(--text-secondary);margin-top:8px;font-size:1rem}
        .header .stats{display:inline-flex;gap:16px;margin-top:16px;background:var(--card-bg);padding:8px 20px;border-radius:var(--radius-full);box-shadow:var(--shadow);font-size:.85rem;color:var(--text-secondary)}
        .header .stats span{font-weight:600;color:var(--primary)}
        .header .date-note{margin-top:12px;font-size:.8rem;color:var(--text-muted)}
        .filter-panel{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:24px}
        .filter-section{margin-bottom:16px}.filter-section:last-child{margin-bottom:0}
        .filter-label{font-size:.8rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .filter-tags{display:flex;flex-wrap:wrap;gap:8px}
        .tag{padding:6px 16px;border-radius:var(--radius-full);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s ease;border:1.5px solid var(--border);background:var(--bg);color:var(--text-secondary);user-select:none}
        .tag:hover{border-color:#cbd5e1;background:#f1f5f9;transform:translateY(-1px)}
        .tag.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(37,99,235,.25)}
        .tag.active:hover{background:var(--primary-dark)}
        .tag.cpu{background:#fef3c7;color:#92400e;border-color:#fde68a}
        .tag.cpu.active{background:#d97706;color:#fff;border-color:#d97706}
        .tag.screen{background:#fdf2f8;color:#db2777;border-color:#fbcfe8}
        .tag.screen.active{background:#db2777;color:#fff;border-color:#db2777}
        .active-bar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:12px 16px;background:var(--primary-light);border-radius:var(--radius-sm);margin-bottom:20px;min-height:44px}
        .active-bar .label{font-size:.8rem;font-weight:600;color:var(--primary)}
        .active-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--card-bg);border-radius:var(--radius-full);font-size:.8rem;font-weight:500;box-shadow:var(--shadow)}
        .active-badge .x{cursor:pointer;color:var(--text-muted);font-weight:700}.active-badge .x:hover{color:#ef4444}
        .clear-btn{margin-left:auto;background:none;border:none;color:var(--text-muted);font-size:.8rem;cursor:pointer;text-decoration:underline}.clear-btn:hover{color:#ef4444}
        .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
        .result-info{font-size:.9rem;color:var(--text-secondary)}.result-info strong{color:var(--primary);font-size:1.1rem}
        .sort-select{padding:8px 16px;border:1.5px solid var(--border);border-radius:var(--radius-full);font-size:.85rem;background:var(--card-bg);cursor:pointer;outline:none}.sort-select:focus{border-color:var(--primary)}
        .phone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
        .phone-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:all .25s ease;border:1px solid var(--border);display:flex;flex-direction:column}
        .phone-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:#cbd5e1}
        .card-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
        .phone-name{font-size:1.1rem;font-weight:700;color:var(--text);line-height:1.3}
        .brand-badge{padding:3px 10px;border-radius:var(--radius-full);font-size:.7rem;font-weight:600;background:var(--primary-light);color:var(--primary);white-space:nowrap}
        .price-badge{padding:3px 10px;border-radius:var(--radius-full);font-size:.8rem;font-weight:700;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;white-space:nowrap}
        .card-body{padding:16px 20px;flex:1}
        .spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .spec-cell{padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm)}
        .spec-cell .label{font-size:.7rem;color:var(--text-muted);margin-bottom:2px}
        .spec-cell .value{font-size:.82rem;font-weight:600;color:var(--text)}
        .detail-section{margin-top:12px;padding:12px;background:var(--bg);border-radius:var(--radius-sm)}
        .detail-title{font-size:.75rem;font-weight:600;color:var(--primary);margin-bottom:8px;display:flex;align-items:center;gap:4px}
        .detail-row{font-size:.75rem;color:var(--text-secondary);margin-bottom:4px;line-height:1.4}
        .detail-row strong{color:var(--text);font-weight:600}
        .card-footer{padding:14px 20px;display:flex;flex-wrap:wrap;gap:6px}
        .feature-tag{padding:3px 10px;border-radius:var(--radius-full);font-size:.72rem;font-weight:500;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
        .feature-tag.purple{background:#faf5ff;color:#7c3aed;border-color:#e9d5ff}
        .feature-tag.amber{background:#fffbeb;color:#d97706;border-color:#fde68a}
        .feature-tag.blue{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
        .feature-tag.fold{background:#fdf2f8;color:#db2777;border-color:#fbcfe8}
        .feature-tag.cpu{background:#fef3c7;color:#92400e;border-color:#fde68a}
        .feature-tag.green{background:#ecfdf5;color:#059669;border-color:#a7f3d0}
        .feature-tag.red{background:#fef2f2;color:#dc2626;border-color:#fecaca}
        .no-results{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-muted)}
        .no-results .emoji{font-size:3rem;margin-bottom:16px}.no-results p{font-size:1rem}
        .loading{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-muted)}
        .loading .spinner{font-size:2rem;animation:spin 1s linear infinite;display:inline-block}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .error-msg{grid-column:1/-1;text-align:center;padding:80px 20px;color:#dc2626}
        footer{text-align:center;padding:40px 0;font-size:.8rem;color:var(--text-muted)}
        @media(max-width:768px){.container{padding:16px 12px 60px}.header h1{font-size:1.6rem}.phone-grid{grid-template-columns:1fr}.filter-panel{padding:16px}.spec-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📱 智能手机选购助手</h1>
        <p>基于官方数据 · 多维度筛选 · 找到最适合你的手机</p>
        <div class="stats" id="statsBar">加载中...</div>
        <div class="date-note">📅 数据来源截止到 2026年5月7日 · 价格来自各品牌官网</div>
    </div>
    <div class="filter-panel">
        <div class="filter-section"><div class="filter-label">🏢 品牌</div><div class="filter-tags" id="brandTags"></div></div>
        <div class="filter-section"><div class="filter-label">📱 屏幕形态 <span style="font-weight:400;text-transform:none;color:#94a3b8">（单选）</span></div><div class="filter-tags" id="screenTags"></div></div>
        <div class="filter-section"><div class="filter-label">⚡ 处理器</div><div class="filter-tags" id="cpuTags"></div></div>
        <div class="filter-section"><div class="filter-label">🏷️ 特性标签 <span style="font-weight:400;text-transform:none;color:#94a3b8">（可多选叠加）</span></div><div class="filter-tags" id="featureTags"></div></div>
    </div>
    <div class="active-bar" id="activeBar" style="display:none"><span class="label">当前筛选：</span><div id="activeBadges"></div><button class="clear-btn" id="clearAll">清空全部</button></div>
    <div class="toolbar">
        <div class="result-info">共 <strong id="resultCount">0</strong> 款符合条件</div>
        <select class="sort-select" id="sortSelect">
            <option value="newest">🆕 最新发布</option>
            <option value="price_asc">💰 价格低 ↑</option>
            <option value="price_desc">💰 价格高 ↓</option>
            <option value="battery_desc">🔋 电池容量 ↓</option>
            <option value="weight_asc">⚖️ 重量轻 ↑</option>
            <option value="screen_desc">📐 屏幕大 ↓</option>
            <option value="charging_desc">⚡ 快充功率 ↓</option>
            <option value="brand_asc">🏢 品牌 A-Z</option>
        </select>
    </div>
    <div class="phone-grid" id="phoneGrid">
        <div class="loading"><div class="spinner">⏳</div><p>加载数据中...</p></div>
    </div>
    <footer>💡 数据来源：各品牌官网 · 参数仅供参考，实际以官方为准<br>Made with ❤️ by Lumi</footer>
</div>
<script>
// 从 JSON 文件加载数据
let phones = [];

async function loadData() {
    try {
        const resp = await fetch('data/phones.json');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        phones = await resp.json();
        init();
    } catch (err) {
        document.getElementById('phoneGrid').innerHTML = 
            `<div class="error-msg"><div class="emoji">😢</div><p>数据加载失败：${err.message}</p><p style="margin-top:8px;font-size:.85rem">请检查网络连接或刷新页面重试</p></div>`;
    }
}

// 筛选和渲染逻辑
const cpuTags=["骁龙8 Elite 5","骁龙8 Elite 1","天玑9500","麒麟9030","麒麟9020","天玑9400","麒麟9010s","A19","A18"];
const featureTags=["潜望长焦","6500mAh+","≤200g","防水","NFC","红外","USB3.0","无线充电","散热风扇"];
const tagDisplayNames={"6500mAh+":"6500mAh+","≤200g":"≤200g"};
const screenTypes=['直屏','折叠屏'];
const brandList=["苹果","华为","小米","OPPO","vivo","三星","HONOR","REDMI","iQOO","一加","真我","红魔"];
function getTagDisplayName(tag){return tagDisplayNames[tag]||tag}
let selectedBrands=new Set(),selectedScreen=null,selectedCpu=new Set(),selectedTags=new Set(),currentSort='newest';

function matchesFilters(p){
    if(selectedBrands.size>0&&!selectedBrands.has(p.brand))return false;
    if(selectedScreen&&p.screen_form!==selectedScreen)return false;
    if(selectedCpu.size>0){let hasCpu=false;for(let c of selectedCpu)if(p.tags.includes(c)){hasCpu=true;break}if(!hasCpu)return false}
    for(let t of selectedTags)if(!p.tags.includes(t))return false;
    return true;
}
function getFiltered(){return phones.filter(matchesFilters)}
function sortPhones(l){const s=[...l];switch(currentSort){case'newest':s.sort((a,b)=>(b.release_date||'').localeCompare(a.release_date||''));break;case'price_asc':s.sort((a,b)=>(a.price||99999)-(b.price||99999));break;case'price_desc':s.sort((a,b)=>(b.price||0)-(a.price||0));break;case'battery_desc':s.sort((a,b)=>b.battery_mah-a.battery_mah);break;case'weight_asc':s.sort((a,b)=>(a.weight_g||9999)-(b.weight_g||9999));break;case'screen_desc':s.sort((a,b)=>b.screen_size-a.screen_size);break;case'charging_desc':s.sort((a,b)=>b.charging_w-a.charging_w);break;case'brand_asc':s.sort((a,b)=>a.brand.localeCompare(b.brand)||a.model.localeCompare(b.model));break;}return s}

function renderStats(){
    const total=phones.length;
    const withPrice=phones.filter(p=>p.price).length;
    const brands=new Set(phones.map(p=>p.brand)).size;
    document.getElementById('statsBar').innerHTML=`覆盖 <span>${brands}</span> 个品牌 · 共 <span>${total}</span> 款机型 · 已收录 <span>${withPrice}</span> 款价格`;
}

function renderBrandTags(){const c=document.getElementById('brandTags');c.innerHTML='';brandList.forEach(b=>{const el=document.createElement('span');el.className='tag'+(selectedBrands.has(b)?' active':'');el.textContent=b;el.onclick=()=>{selectedBrands.has(b)?selectedBrands.delete(b):selectedBrands.add(b);refresh()};c.appendChild(el)})}
function renderScreenTags(){const c=document.getElementById('screenTags');c.innerHTML='';screenTypes.forEach(s=>{const el=document.createElement('span');el.className='tag screen'+(selectedScreen===s?' active':'');el.textContent=s;el.onclick=()=>{selectedScreen=selectedScreen===s?null:s;refresh()};c.appendChild(el)})}
function renderCpuTags(){const c=document.getElementById('cpuTags');c.innerHTML='';cpuTags.forEach(t=>{const el=document.createElement('span');el.className='tag cpu'+(selectedCpu.has(t)?' active':'');el.textContent=t;el.onclick=()=>{selectedCpu.has(t)?selectedCpu.delete(t):selectedCpu.add(t);refresh()};c.appendChild(el)})}
function renderFeatureTags(){const c=document.getElementById('featureTags');c.innerHTML='';featureTags.forEach(t=>{const el=document.createElement('span');el.className='tag'+(selectedTags.has(t)?' active':'');el.textContent=getTagDisplayName(t);el.onclick=()=>{selectedTags.has(t)?selectedTags.delete(t):selectedTags.add(t);refresh()};c.appendChild(el)})}
function renderActiveBar(){const bar=document.getElementById('activeBar'),badges=document.getElementById('activeBadges'),total=selectedBrands.size+(selectedScreen?1:0)+selectedCpu.size+selectedTags.size;if(total===0){bar.style.display='none';return}bar.style.display='flex';badges.innerHTML='';selectedBrands.forEach(b=>addBadge(badges,b,()=>{selectedBrands.delete(b);refresh()}));if(selectedScreen)addBadge(badges,selectedScreen,()=>{selectedScreen=null;refresh()});selectedCpu.forEach(c=>addBadge(badges,c,()=>{selectedCpu.delete(c);refresh()}));selectedTags.forEach(t=>addBadge(badges,getTagDisplayName(t),()=>{selectedTags.delete(t);refresh()}))}
function addBadge(c,t,r){const el=document.createElement('span');el.className='active-badge';el.innerHTML=t+' <span class="x">✕</span>';el.querySelector('.x').onclick=r;c.appendChild(el)}

function renderPhones(){
    const filtered=sortPhones(getFiltered()),grid=document.getElementById('phoneGrid');
    document.getElementById('resultCount').textContent=filtered.length;
    if(filtered.length===0){grid.innerHTML='<div class="no-results"><div class="emoji">😢</div><p>没有找到符合条件的手机，试试调整筛选条件吧～</p></div>';return}
    grid.innerHTML=filtered.map(p=>{
        const priceHtml=p.price?'<span class="price-badge">¥'+p.price+'</span>':'';
        const sc=[{l:'处理器',v:p.processor||'—'},{l:'屏幕',v:(p.screen_size?p.screen_size+'英寸':'')+(p.screen_type?' '+p.screen_type:'')||'—'},{l:'电池',v:p.battery_mah?p.battery_mah+'mAh':'—'},{l:'有线充电',v:p.charging_w?p.charging_w+'W':'—'},{l:'无线充电',v:p.wireless_charging_w?p.wireless_charging_w+'W':'不支持'},{l:'USB',v:p.usb_version||'—'},{l:'重量',v:p.weight_g?p.weight_g+'g':'—'},{l:'系统',v:p.os||'—'}];
        let detailHtml='';
        if(p.detailed_camera){detailHtml+='<div class="detail-section"><div class="detail-title">📷 影像系统</div><div class="detail-row">'+p.detailed_camera+'</div></div>'}
        let ch='';
        if(!p.detailed_camera&&p.camera_desc){ch='<div class="detail-section"><div class="detail-title">📷 影像系统</div><div class="detail-row">'+p.camera_desc+'</div></div>'}
        const ft=[];
        if(p.has_tele)ft.push({t:'🔭 潜望长焦',c:'purple'});
        if(p.screen_form==='折叠屏')ft.push({t:'📱 折叠屏',c:'fold'});
        if(p.tags.includes('无线充电'))ft.push({t:'🔋 无线充电',c:'green'});
        if(p.tags.includes('散热风扇'))ft.push({t:'🌀 散热风扇',c:'red'});
        (p.features||[]).forEach(f=>{if(f.includes('IP68')||f.includes('IP69'))ft.push({t:'💧 '+f,c:'blue'});else if(f.includes('NFC'))ft.push({t:'📡 NFC',c:''});else if(f.includes('红外'))ft.push({t:'🔴 红外',c:'amber'});else ft.push({t:f,c:''})});
        p.tags.forEach(t=>{if(cpuTags.includes(t))ft.push({t:'⚡ '+t,c:'cpu'})});
        let fh=ft.length>0?'<div class="card-footer">'+ft.map(f=>'<span class="feature-tag '+f.c+'">'+f.t+'</span>').join('')+'</div>':'';
        return'<div class="phone-card"><div class="card-header"><div class="phone-name">'+p.model+'</div><div style="display:flex;gap:8px;align-items:center">'+priceHtml+'<span class="brand-badge">'+p.brand+'</span></div></div><div class="card-body"><div class="spec-grid">'+sc.map(s=>'<div class="spec-cell"><div class="label">'+s.l+'</div><div class="value">'+s.v+'</div></div>').join('')+'</div>'+detailHtml+ch+'</div>'+fh+'</div>'
    }).join('');
}

function refresh(){renderBrandTags();renderScreenTags();renderCpuTags();renderFeatureTags();renderActiveBar();renderPhones()}

function init(){
    renderStats();
    refresh();
}

document.getElementById('sortSelect').addEventListener('change',e=>{currentSort=e.target.value;refresh()});
document.getElementById('clearAll').addEventListener('click',()=>{selectedBrands.clear();selectedScreen=null;selectedCpu.clear();selectedTags.clear();refresh()});

// 启动
loadData();
</script>
</body>
</html>
