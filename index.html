<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>📱 智能手机选购助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📱 智能手机选购助手</h1>
        <p>基于官方数据 · 多维度筛选 · 找到最适合你的手机</p>
        <div class="stats" id="statsBar">加载中...</div>
        <div class="date-note">📅 数据来源截止到 2026年5月7日 · 价格来自各品牌官网</div>
    </div>

    <!-- 搜索框 -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 搜索机型名称... (快捷键 Cmd+K)" autocomplete="off">
        <button class="search-clear" id="searchClear" style="display:none">✕</button>
    </div>

    <div class="filter-panel">
        <div class="filter-section">
            <div class="filter-label">🏢 品牌 <span class="filter-count" id="brandCount"></span></div>
            <div class="filter-tags" id="brandTags"></div>
        </div>
        <div class="filter-section">
            <div class="filter-label">📱 屏幕形态 <span style="font-weight:400;text-transform:none;color:#94a3b8">（单选）</span></div>
            <div class="filter-tags" id="screenTags"></div>
        </div>
        <div class="filter-section">
            <div class="filter-label">⚡ 处理器</div>
            <div class="filter-tags" id="cpuTags"></div>
        </div>
        <div class="filter-section">
            <div class="filter-label">🏷️ 特性标签 <span style="font-weight:400;text-transform:none;color:#94a3b8">（可多选叠加）</span></div>
            <div class="filter-tags" id="featureTags"></div>
        </div>
    </div>

    <div class="active-bar" id="activeBar" style="display:none">
        <span class="label">当前筛选：</span>
        <div id="activeBadges"></div>
        <button class="clear-btn" id="clearAll">清空全部</button>
    </div>

    <div class="toolbar">
        <div class="result-info">共 <strong id="resultCount">0</strong> 款符合条件</div>
        <div class="toolbar-right">
            <button class="compare-btn" id="compareBtn" style="display:none">
                📊 对比 <span id="compareCount">0</span>
            </button>
            <select class="sort-select" id="sortSelect">
                <option value="newest">🆕 最新发布</option>
                <option value="price_asc">💰 价格低 ↑</option>
                <option value="price_desc">💰 价格高 ↓</option>
                <option value="battery_desc">🔋 电池容量 ↓</option>
                <option value="weight_asc">⚖️ 重量轻 ↑</option>
                <option value="screen_desc">📐 屏幕大 ↓</option>
                <option value="charging_desc">⚡ 快充功率 ↓</option>
                <option value="brand_asc">🏢 品牌 A-Z</option>
            </select>
        </div>
    </div>

    <div class="phone-grid" id="phoneGrid">
        <div class="loading"><div class="spinner">⏳</div><p>加载数据中...</p></div>
    </div>

    <!-- 对比面板 -->
    <div class="compare-panel" id="comparePanel" style="display:none">
        <div class="compare-header">
            <h3>📊 机型对比 <span id="comparePanelCount">0</span>/4</h3>
            <button class="compare-close" id="compareClose">✕</button>
        </div>
        <div class="compare-body" id="compareBody"></div>
    </div>

    <!-- 回到顶部 -->
    <button class="back-top" id="backTop" style="display:none">⬆</button>

    <footer>💡 数据来源：各品牌官网 · 参数仅供参考，实际以官方为准<br>Made with ❤️ by Lumi</footer>
</div>

<script src="script.js"></script>
</body>
</html>
